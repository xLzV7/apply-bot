name: Daily Job Apply Bot

on:
  schedule:
    - cron: '20 9 * * *'
      timezone: 'Asia/Tokyo'
  workflow_dispatch: # 手動実行ボタン用

jobs:
  # --- アデコ実行ジョブ ---
  run-adecco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Adecco
        env:
          ADECCO_ID: ${{ secrets.ADECCO_ID }}
          ADECCO_PASS: ${{ secrets.ADECCO_PASS }}
        run: python adecco/main.py

      # 💡 アデコのエラー時にスクリーンショットを保存
      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adecco-error-evidence
          path: |
            error_screenshot.png
            error_page.html
          retention-days: 7

  # --- テンプスタッフ実行ジョブ ---
  run-tempstaff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Tempstaff
        env:
          TEMPSTAFF_ID: ${{ secrets.TEMPSTAFF_ID }}
          TEMPSTAFF_PASS: ${{ secrets.TEMPSTAFF_PASS }}
        run: python tempstaff/main.py

      # 💡 テンプスタッフのエラー時にスクリーンショットを保存（追加）
      - name: Upload Error Screenshot (Tempstaff)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tempstaff-error-evidence
          path: |
            tempstaff_error_screenshot.png
            tempstaff_error_page.html
          retention-days: 7
