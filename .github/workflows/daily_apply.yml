name: Daily Adecco Apply

on:
  schedule:
    # 毎日 日本時間 08:00 (UTC 23:00) に実行
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動ボタン用

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Node.js 24への強制移行を回避/対応するための環境変数設定（最新化）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 最新のv4を使用

      - name: Set up Python
        uses: actions/setup-python@v5 # v4からv5にアップデート

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          ADEKO_ID: ${{ secrets.ADEKO_ID }}
          ADEKO_PASS: ${{ secrets.ADEKO_PASS }}
        run: python main.py
